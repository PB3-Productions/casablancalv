name: Apply Casablanca Hero Upgrade

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-casablanca-hero-upgrade.yml"

permissions:
  contents: write

jobs:
  apply-hero-upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply split hero and luxury funnel upgrades
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          index_path = Path("index.html")
          css_path = Path("assets/css/mobile-gallery-fixes.css")
          workflow_path = Path(".github/workflows/apply-casablanca-hero-upgrade.yml")

          html = index_path.read_text(encoding="utf-8")

          # BLOCK 1: strengthen title/description language without changing brand intent.
          html = html.replace(
              "<title>Luxury Mansion Rental Near the Las Vegas Strip | Casablanca Las Vegas</title>",
              "<title>Luxury Mansion Rentals in Las Vegas | Casablanca Las Vegas</title>"
          )
          html = html.replace(
              '<meta name="description" content="Explore Casablanca Las Vegas, an ultra-private luxury estate near the Las Vegas Strip with resort pool, 10 bedrooms, concierge add-ons, 3D tour, event pricing, and VIP booking support." />',
              '<meta name="description" content="Explore Casablanca Las Vegas, an ultra-private luxury mansion rental near the Las Vegas Strip with resort pool, 10 possible bedrooms, concierge add-ons, 3D tour, and guided availability review." />'
          )
          html = html.replace(
              '<meta property="og:title" content="Luxury Mansion Rental Near the Las Vegas Strip | Casablanca Las Vegas" />',
              '<meta property="og:title" content="Luxury Mansion Rentals in Las Vegas | Casablanca Las Vegas" />'
          )
          html = html.replace(
              '<meta name="twitter:title" content="Luxury Mansion Rental Near the Las Vegas Strip | Casablanca Las Vegas" />',
              '<meta name="twitter:title" content="Luxury Mansion Rentals in Las Vegas | Casablanca Las Vegas" />'
          )
          html = html.replace(
              '"name": "Luxury Mansion Rental Near the Las Vegas Strip | Casablanca Las Vegas",',
              '"name": "Luxury Mansion Rentals in Las Vegas | Casablanca Las Vegas",'
          )
          html = html.replace(
              '"keywords": "luxury mansion rental Las Vegas, Las Vegas mansions for rent, luxury vacation rentals Las Vegas, private estate rental Las Vegas, Las Vegas villa rental, luxury home rental Las Vegas, private event venue Las Vegas, vacation rental near Las Vegas Strip, VIP concierge Las Vegas, production location Las Vegas",',
              '"keywords": "Las Vegas mansion rentals, mansion rental Las Vegas, luxury mansion rentals Las Vegas, Las Vegas mansions for rent, luxury vacation rentals Las Vegas, private estate rental Las Vegas, Las Vegas villa rental, luxury home rental Las Vegas, private event venue Las Vegas, mansion rentals in Las Vegas for weddings, vacation rental near Las Vegas Strip, VIP concierge Las Vegas, production location Las Vegas",'
          )

          new_hero_block = '''<!-- =========================================================
         BLOCK 5 START: SPLIT PRIVATE ESTATE HERO — IMAGE PROTECTED / CTA OFF IMAGE
         ========================================================= -->
    <section class="hero hero-split" aria-labelledby="hero-title">
      <div class="hero-split-media" aria-label="Casablanca Las Vegas luxury estate hero image">
        <picture class="hero-picture">
          <source srcset="https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/6a1730e5ab0c04a0ea3601a7.webp 1920w" type="image/webp" sizes="(min-width: 1024px) 56vw, 100vw" />
          <img src="https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/6a1730e5ab0c04a0ea3601a7.webp" srcset="https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/6a1730e5ab0c04a0ea3601a7.webp 1920w" sizes="(min-width: 1024px) 56vw, 100vw" width="1920" height="1080" alt="Ultra-private Casablanca Las Vegas luxury mansion rental with resort pool near the Las Vegas Strip" fetchpriority="high" decoding="async" />
        </picture>
      </div>

      <div class="hero-split-panel">
        <p class="hero-kicker">Private Estate Rental Near the Las Vegas Strip</p>

        <h1 id="hero-title" class="font-display hero-split-title">
          Luxury Mansion Rentals in Las Vegas for Private Stays, Events & VIP Experiences
        </h1>

        <p class="hero-split-lead">
          Casablanca Las Vegas is an ultra-private 6,991 sq. ft. estate with 10 possible bedrooms,
          resort-style outdoor space, concierge add-ons, and guided booking support for elevated
          group stays, retreats, productions, weddings, and private events.
        </p>

        <div class="hero-split-actions" aria-label="Primary booking actions">
          <a class="btn btn-gold hero-primary-cta" href="#availability">Request Private Availability Review</a>
          <a class="btn btn-outline hero-secondary-cta" href="#video-tour">View the Estate Tour</a>
        </div>

        <div class="hero-split-proof" aria-label="Estate highlights">
          <div class="hero-proof-item"><b>10</b><span>Possible Bedrooms</span></div>
          <div class="hero-proof-item"><b>6</b><span>Full Bathrooms</span></div>
          <div class="hero-proof-item"><b>6,991</b><span>Approx. Sq. Ft.</span></div>
          <div class="hero-proof-item"><b>~5 Mi</b><span>From the Strip</span></div>
        </div>
      </div>
    </section>
    <!-- =========================================================
         BLOCK 5 END: SPLIT PRIVATE ESTATE HERO — IMAGE PROTECTED / CTA OFF IMAGE
         ========================================================= -->'''

          html, count = re.subn(
              r'<!-- =========================================================\n         BLOCK 5 START:.*?BLOCK 5 END:.*?========================================================= -->',
              new_hero_block,
              html,
              count=1,
              flags=re.S
          )
          if count != 1:
              raise RuntimeError("Could not find and replace BLOCK 5 hero section.")

          html = html.replace(
              '<h1 class="font-display title-lg" style="text-align:center; margin:1rem 0 1.25rem;">Luxury Mansion Rental Near the Las Vegas Strip</h1>',
              '<h2 class="font-display title-lg" style="text-align:center; margin:1rem 0 1.25rem;">A Private Las Vegas Estate Designed for Groups, Events & VIP Stays</h2>'
          )

          index_path.write_text(html, encoding="utf-8")

          css = css_path.read_text(encoding="utf-8")
          hero_css_marker = "BLOCK 1.11 START: Split luxury hero upgrade"
          hero_css = r'''

/* =========================================================
   BLOCK 1.11 START: Split luxury hero upgrade
   Purpose: 2026-style guided estate arrival without covering hero image.
   ========================================================= */
.hero-split {
  position: relative;
  min-height: 100svh;
  display: grid;
  grid-template-columns: minmax(0, 1.08fr) minmax(390px, .92fr);
  align-items: stretch;
  overflow: hidden;
  background:
    radial-gradient(circle at 82% 12%, rgba(255, 238, 169, .16), transparent 27rem),
    linear-gradient(135deg, #070706 0%, #14110c 48%, #070706 100%);
  color: var(--bg-ivory);
  isolation: isolate;
}

.hero-split::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background: linear-gradient(90deg, transparent 0%, transparent 50%, rgba(7, 7, 6, .26) 58%, rgba(7, 7, 6, .82) 100%);
}

.hero-split-media {
  position: relative;
  min-height: 100svh;
  overflow: hidden;
  background: #090806;
}

.hero-split-media .hero-picture,
.hero-split-media .hero-picture img {
  display: block;
  width: 100%;
  height: 100%;
}

.hero-split-media .hero-picture img {
  min-height: 100svh;
  object-fit: cover;
  object-position: center;
  filter: saturate(1.04) contrast(1.07) brightness(.9);
  transform: scale(1.018);
}

.hero-split-panel {
  position: relative;
  z-index: 3;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding:
    clamp(8.25rem, 10vw, 11rem)
    clamp(1.25rem, 4.8vw, 5.75rem)
    clamp(3.5rem, 6vw, 6rem);
  border-left: 1px solid rgba(255, 238, 169, .18);
  background:
    radial-gradient(circle at 20% 16%, rgba(255, 238, 169, .13), transparent 19rem),
    linear-gradient(180deg, rgba(19, 15, 9, .94), rgba(8, 8, 6, .98));
  box-shadow: -34px 0 90px rgba(0, 0, 0, .38);
}

.hero-kicker {
  display: inline-flex;
  align-items: center;
  gap: .78rem;
  width: fit-content;
  margin: 0 0 clamp(.85rem, 1.4vw, 1.25rem);
  color: #ffe58a;
  font-family: var(--font-title) !important;
  font-size: clamp(.66rem, .82vw, .82rem);
  font-weight: 800;
  letter-spacing: .18em;
  line-height: 1.35;
  text-transform: uppercase;
  text-shadow: 0 0 .9rem rgba(255, 229, 138, .28);
}

.hero-kicker::before {
  content: "";
  width: clamp(1.8rem, 4vw, 3.6rem);
  height: 1px;
  background: currentColor;
  opacity: .72;
}

.hero-split-title {
  max-width: 820px;
  margin: 0;
  color: #fffaf0;
  font-size: clamp(2.15rem, 4.75vw, 5.95rem);
  line-height: .9;
  font-weight: 800;
  letter-spacing: -.052em;
  text-wrap: balance;
  text-shadow: 0 18px 58px rgba(0, 0, 0, .46);
}

.hero-split-lead {
  max-width: 720px;
  margin: clamp(1rem, 2vw, 1.55rem) 0 0;
  color: rgba(255, 253, 247, .78);
  font-size: clamp(.98rem, 1.24vw, 1.15rem);
  line-height: 1.72;
  text-align: left !important;
}

.hero-split-actions {
  display: flex;
  flex-wrap: wrap;
  gap: .8rem;
  margin-top: clamp(1.25rem, 2.35vw, 2rem);
}

.hero-split-actions .btn {
  min-height: clamp(3.05rem, 4vw, 3.55rem);
  padding-inline: clamp(1.05rem, 2vw, 1.55rem) !important;
  font-size: clamp(.62rem, .72vw, .76rem) !important;
}

.hero-split-actions .btn-outline {
  color: #ffe58a !important;
  border-color: rgba(255, 238, 169, .55) !important;
}

.hero-split-proof {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: .68rem;
  width: min(760px, 100%);
  margin-top: clamp(1.25rem, 2.2vw, 1.9rem);
}

.hero-proof-item {
  min-width: 0;
  padding: clamp(.8rem, 1.4vw, 1.05rem) .72rem;
  border: 1px solid rgba(255, 238, 169, .18);
  border-radius: 1rem;
  background: rgba(255, 255, 255, .055);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08), 0 16px 30px rgba(0, 0, 0, .22);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

.hero-proof-item b {
  display: block;
  color: #ffe58a;
  font-family: var(--font-title) !important;
  font-size: clamp(1.2rem, 1.9vw, 1.85rem);
  line-height: 1;
}

.hero-proof-item span {
  display: block;
  margin-top: .35rem;
  color: rgba(255, 253, 247, .68);
  font-family: var(--font-title) !important;
  font-size: clamp(.56rem, .68vw, .66rem);
  font-weight: 800;
  letter-spacing: .1em;
  line-height: 1.28;
  text-transform: uppercase;
}

/* Keep the following intro card from colliding with the split hero. */
.hero-split + .intro-panel {
  margin-top: 0 !important;
}

@media (prefers-reduced-motion: no-preference) {
  .hero-split-media .hero-picture img {
    animation: casaProtectedHeroDrift 14s ease-out both;
  }

  @keyframes casaProtectedHeroDrift {
    from { transform: scale(1.075); }
    to { transform: scale(1.018); }
  }
}

@media (max-width: 1180px) {
  .hero-split {
    grid-template-columns: minmax(0, 1fr) minmax(350px, .92fr);
  }

  .hero-split-proof {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 900px) {
  .hero-split {
    min-height: auto;
    grid-template-columns: 1fr;
  }

  .hero-split::before {
    display: none;
  }

  .hero-split-media {
    min-height: clamp(360px, 62svh, 680px);
  }

  .hero-split-media .hero-picture img {
    min-height: clamp(360px, 62svh, 680px);
    object-position: center;
  }

  .hero-split-panel {
    min-height: auto;
    padding: clamp(2rem, 8vw, 3.4rem) clamp(1rem, 5vw, 2rem) clamp(2.5rem, 8vw, 4rem);
    border-left: 0;
    border-top: 1px solid rgba(255, 238, 169, .18);
    box-shadow: 0 -28px 70px rgba(0, 0, 0, .4);
  }

  .hero-split-title {
    font-size: clamp(2.15rem, 10.8vw, 4.4rem);
  }

  .hero-split-actions {
    display: grid;
    grid-template-columns: 1fr;
  }

  .hero-split-actions .btn {
    width: 100%;
  }
}

@media (max-width: 520px) {
  .hero-split-media {
    min-height: clamp(320px, 56svh, 560px);
  }

  .hero-split-media .hero-picture img {
    min-height: clamp(320px, 56svh, 560px);
    object-position: 54% center;
  }

  .hero-split-proof {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .hero-proof-item {
    border-radius: .85rem;
  }
}
/* =========================================================
   BLOCK 1.11 END: Split luxury hero upgrade
   ========================================================= */
'''
          if hero_css_marker not in css:
              css = css.rstrip() + hero_css + "\n"
              css_path.write_text(css, encoding="utf-8")

          # Remove this temporary workflow so the repo does not keep an unnecessary automation file.
          workflow_path.unlink(missing_ok=True)
          PY

      - name: Commit applied changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Upgrade Casablanca split hero and luxury funnel"
            git push
          fi
